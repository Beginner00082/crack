<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Alert</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="matrix-bg" id="matrix"></div>
    
    <div class="alert-container" id="alert">
        <div class="warning-icon">⚠️</div>
        <h1>ATTENZIONE</h1>
        <p class="main-text">Aprendo questo link hai fornito accesso remoto del tuo dispositivo al proprietario della pagina.</p>
        <p class="sub-text">È consigliato effettuare immediatamente una scansione virus dal sistema.</p>
        <div class="loading">
            <div class="loading-bar"></div>
            <span id="percent">0%</span>
        </div>
        <p class="scanning">Scansione in corso...</p>
    </div>

    <div class="troll-message" id="troll">
        <h1>Te squagliat ee sto pariann, forse 😂</p>
        <div class="troll-buttons">
            <button onclick="location.reload()">Rifai lo scherzo</button>
            <button onclick="window.close()">Esci</button>
        </div>
    </div>

    <audio id="beep" loop>
